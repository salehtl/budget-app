<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cactus Money</title>
  <meta name="description" content="Personal finance tracker - track spending, plan budgets, stay sharp.">
  <meta property="og:title" content="Cactus Money">
  <meta property="og:description" content="Personal finance tracker - track spending, plan budgets, stay sharp.">
  <meta property="og:type" content="website">
  <link rel="icon" href="/meta-media/manifest-icon-192.jpg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: #64748b;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: #2D1CD1;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/meta-media/manifest-icon-192.jpg" alt="Cactus Money" class="logo">
    <h1>Cactus Money</h1>
    <p>Personal finance tracker</p>
    <a href="/">Open App</a>
  </div>
  <script>
    // Auto-redirect after a brief moment so the page isn't blank
    setTimeout(function() { window.location.href = '/'; }, 1500);
  </script>
</body>
</html>
